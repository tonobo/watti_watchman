$schema: http://json-schema.org/draft-07/schema#
$id: http://watti.klaut.io/schemas/services_schema.yml
title: Services Array
type: array
items:
  type: object
  properties:
    type:
      type: string
      description: The type of service to configure.
  required:
    - type
  if:
    properties:
      type:
        const: HassFeeder
  then:
    $ref: http://watti.klaut.io/schemas/hass_feeder_service_schema.yml
  else:
    if:
      properties:
        type:
          const: VictronGridFeeder
    then:
      $ref: http://watti.klaut.io/schemas/victron_grid_feeder_service_schema.yml
    else:
      if:
        properties:
          type:
            const: ChargeController
      then:
        $ref: http://watti.klaut.io/schemas/charge_controller_service_schema.yml
      else:
        errorMessage: Unsupported service type.
